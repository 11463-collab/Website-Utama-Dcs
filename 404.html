<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Dcs-New</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #252525;
            --bg-nav: rgba(26, 26, 26, 0.95);
            --accent: #ffca28;
            --text-main: #f4f4f4;
            --text-muted: #aaa;
            --transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            color: var(--text-main); 
            line-height: 1.6; 
            background-color: var(--bg-dark); 
            display: flex;
            flex-direction: column;
            padding: 100px;
            align-items: center;
            justify-content: center;
        }
        h1 { 
            font-size: 6rem; 
            color: var(--accent); 
            margin-bottom: 10px; 
        }
        p { 
            font-size: 1.2rem; 
            text-align: center; 
        }

    </style>
</head>
<body>
    <h1>404</h1>
    <p>The page you are looking for does not exist.</p>
    <p><a href="/" style="color: var(--accent); text-decoration: none;">Go back to Home</a></p>
</body>
</html>
